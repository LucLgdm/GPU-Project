services:
  builder:
    build: .
    volumes:
      - .:/Homeworks
      - apt_cache:/var/cache/apt
      - rc_objs:/Homeworks/RC/objs
      - pt_objs:/Homeworks/PathTracing/objs
      # If cuda is on the host, mount it read-only to the container. Adjust the path if necessary.
      # - /usr/local/cuda:/usr/local/cuda:ro  # toolkit hôte, lecture seule
      - /sgoinfre/goinfre/Perso/lde-merc/miniconda3/envs/cuda-env:/cuda-env:ro
    working_dir: /Homeworks
    environment:
      # If using the host's CUDA, set these paths. If using a custom CUDA environment, adjust accordingly.
      #- PATH=/usr/local/cuda/bin:$PATH
      #- LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
      - PATH=/cuda-env/bin:$PATH
      - LD_LIBRARY_PATH=/cuda-env/lib

volumes:
  apt_cache:
  rc_objs:
  pt_objs: